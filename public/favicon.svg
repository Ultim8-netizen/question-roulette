<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#020308"/>

  <!-- wheel: center (16,20), outer r=10 -->
  <circle cx="16" cy="20" r="10" fill="#07080f" stroke="#c8d0de" stroke-width="1.1"/>
  <circle cx="16" cy="20" r="7.5" fill="none" stroke="#c8d0de" stroke-width="0.4" opacity="0.35"/>

  <!-- spokes (inner r=7.5 → outer r=10) at 45° intervals -->
  <g stroke="#c8d0de" stroke-width="0.65" stroke-linecap="round" opacity="0.55">
    <!-- 0° top (partly behind card — skip) -->
    <!-- 45° -->
    <line x1="21.3" y1="14.7" x2="23.1" y2="12.9"/>
    <!-- 90° right -->
    <line x1="23.5" y1="20" x2="26" y2="20"/>
    <!-- 135° -->
    <line x1="21.3" y1="25.3" x2="23.1" y2="27.1"/>
    <!-- 180° bottom -->
    <line x1="16" y1="27.5" x2="16" y2="30"/>
    <!-- 225° -->
    <line x1="10.7" y1="25.3" x2="8.9" y2="27.1"/>
    <!-- 270° left -->
    <line x1="8.5" y1="20" x2="6" y2="20"/>
    <!-- 315° -->
    <line x1="10.7" y1="14.7" x2="8.9" y2="12.9"/>
  </g>

  <!-- center hub -->
  <circle cx="16" cy="20" r="1.8" fill="#c8d0de"/>

  <!-- card overlapping wheel center — sitting on top -->
  <rect x="11" y="5" width="10" height="14" rx="1.8" fill="#07080f" stroke="#c8d0de" stroke-width="1.2"/>
  <line x1="13.5" y1="9"   x2="18.5" y2="9"   stroke="#c8d0de" stroke-width="0.9" stroke-linecap="round" opacity="0.60"/>
  <line x1="13.5" y1="11.5" x2="18.5" y2="11.5" stroke="#c8d0de" stroke-width="0.9" stroke-linecap="round" opacity="0.38"/>
</svg>