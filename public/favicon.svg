<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 310" fill="none">
  <rect width="680" height="310" fill="#020308"/>

  <!-- wheel — center (340,172), r=64 outer -->
  <circle cx="340" cy="172" r="64" fill="#07080f" stroke="#c8d0de" stroke-width="1.6"/>
  <circle cx="340" cy="172" r="48" fill="none" stroke="#c8d0de" stroke-width="0.7" opacity="0.38"/>

  <!-- spokes: inner r=48, outer r=64 -->
  <g stroke="#c8d0de" stroke-width="1.1" stroke-linecap="round" opacity="0.60">
    <line x1="340" y1="124" x2="340" y2="108"/>
    <line x1="373.9" y1="137.9" x2="385.3" y2="126.5"/>
    <line x1="388" y1="172" x2="404" y2="172"/>
    <line x1="373.9" y1="206.1" x2="385.3" y2="217.5"/>
    <line x1="340" y1="220" x2="340" y2="236"/>
    <line x1="306.1" y1="206.1" x2="294.7" y2="217.5"/>
    <line x1="292" y1="172" x2="276" y2="172"/>
    <line x1="306.1" y1="137.9" x2="294.7" y2="126.5"/>
  </g>

  <!-- alternating segments -->
  <g opacity="0.11" fill="#c8d0de">
    <path d="M340,172 L340,124 A48,48 0 0,1 373.9,137.9 Z"/>
    <path d="M340,172 L388,172 A48,48 0 0,1 373.9,206.1 Z"/>
    <path d="M340,172 L340,220 A48,48 0 0,1 306.1,206.1 Z"/>
    <path d="M340,172 L292,172 A48,48 0 0,1 306.1,137.9 Z"/>
  </g>

  <!-- hub -->
  <circle cx="340" cy="172" r="8" fill="#07080f" stroke="#c8d0de" stroke-width="1.3"/>
  <circle cx="340" cy="172" r="2.5" fill="#c8d0de"/>

  <!-- card fan — pivot (340,242) -->
  <!-- ±56° -->
  <g transform="rotate(-56,340,242)">
    <rect x="318" y="166" width="44" height="76" rx="5" fill="#07080f" stroke="#c8d0de" stroke-width="1.0" opacity="0.62"/>
    <line x1="325" y1="179" x2="355" y2="179" stroke="#c8d0de" stroke-width="0.8" stroke-linecap="round" opacity="0.28"/>
    <line x1="325" y1="186" x2="355" y2="186" stroke="#c8d0de" stroke-width="0.8" stroke-linecap="round" opacity="0.18"/>
    <circle cx="340" cy="216" r="8" fill="none" stroke="#c8d0de" stroke-width="0.9" opacity="0.22"/>
  </g>
  <g transform="rotate(56,340,242)">
    <rect x="318" y="166" width="44" height="76" rx="5" fill="#07080f" stroke="#c8d0de" stroke-width="1.0" opacity="0.62"/>
    <line x1="325" y1="179" x2="355" y2="179" stroke="#c8d0de" stroke-width="0.8" stroke-linecap="round" opacity="0.28"/>
    <line x1="325" y1="186" x2="355" y2="186" stroke="#c8d0de" stroke-width="0.8" stroke-linecap="round" opacity="0.18"/>
    <circle cx="340" cy="216" r="8" fill="none" stroke="#c8d0de" stroke-width="0.9" opacity="0.22"/>
  </g>

  <!-- ±40° -->
  <g transform="rotate(-40,340,242)">
    <rect x="318" y="166" width="44" height="76" rx="5" fill="#07080f" stroke="#c8d0de" stroke-width="1.1" opacity="0.74"/>
    <line x1="325" y1="179" x2="355" y2="179" stroke="#c8d0de" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
    <line x1="325" y1="186" x2="355" y2="186" stroke="#c8d0de" stroke-width="0.9" stroke-linecap="round" opacity="0.22"/>
    <circle cx="340" cy="216" r="8" fill="none" stroke="#c8d0de" stroke-width="0.9" opacity="0.28"/>
    <circle cx="340" cy="216" r="8" fill="none" stroke="#c8d0de" stroke-width="0.9" opacity="0.28"/>
  </g>
  <g transform="rotate(40,340,242)">
    <rect x="318" y="166" width="44" height="76" rx="5" fill="#07080f" stroke="#c8d0de" stroke-width="1.1" opacity="0.74"/>
    <line x1="325" y1="179" x2="355" y2="179" stroke="#c8d0de" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
    <line x1="325" y1="186" x2="355" y2="186" stroke="#c8d0de" stroke-width="0.9" stroke-linecap="round" opacity="0.22"/>
    <circle cx="340" cy="216" r="8" fill="none" stroke="#c8d0de" stroke-width="0.9" opacity="0.28"/>
  </g>

  <!-- ±24° -->
  <g transform="rotate(-24,340,242)">
    <rect x="318" y="166" width="44" height="76" rx="5" fill="#07080f" stroke="#c8d0de" stroke-width="1.3" opacity="0.86"/>
    <line x1="325" y1="179" x2="355" y2="179" stroke="#c8d0de" stroke-width="1.0" stroke-linecap="round" opacity="0.44"/>
    <line x1="325" y1="186" x2="355" y2="186" stroke="#c8d0de" stroke-width="1.0" stroke-linecap="round" opacity="0.28"/>
    <circle cx="340" cy="216" r="8" fill="none" stroke="#c8d0de" stroke-width="1.0" opacity="0.38"/>
    <circle cx="340" cy="216" r="2.2" fill="#c8d0de" opacity="0.38"/>
  </g>
  <g transform="rotate(24,340,242)">
    <rect x="318" y="166" width="44" height="76" rx="5" fill="#07080f" stroke="#c8d0de" stroke-width="1.3" opacity="0.86"/>
    <line x1="325" y1="179" x2="355" y2="179" stroke="#c8d0de" stroke-width="1.0" stroke-linecap="round" opacity="0.44"/>
    <line x1="325" y1="186" x2="355" y2="186" stroke="#c8d0de" stroke-width="1.0" stroke-linecap="round" opacity="0.28"/>
    <circle cx="340" cy="216" r="8" fill="none" stroke="#c8d0de" stroke-width="1.0" opacity="0.38"/>
    <circle cx="340" cy="216" r="2.2" fill="#c8d0de" opacity="0.38"/>
  </g>

  <!-- center card 0° — full detail, on top -->
  <rect x="318" y="166" width="44" height="76" rx="5" fill="#07080f" stroke="#c8d0de" stroke-width="1.6"/>
  <line x1="325" y1="179" x2="355" y2="179" stroke="#c8d0de" stroke-width="1.1" stroke-linecap="round" opacity="0.60"/>
  <line x1="325" y1="186" x2="355" y2="186" stroke="#c8d0de" stroke-width="1.1" stroke-linecap="round" opacity="0.38"/>
  <circle cx="340" cy="216" r="8" fill="none" stroke="#c8d0de" stroke-width="1.2" opacity="0.65"/>
  <circle cx="340" cy="216" r="2.5" fill="#c8d0de" opacity="0.80"/>
</svg>